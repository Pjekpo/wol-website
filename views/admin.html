<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The WOL Collective | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;900&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin.css">
</head>
<body class="admin-page">
  <header class="admin-topbar">
    <div>
      <p class="admin-brand">The WOL Collective</p>
      <p class="admin-copy">Owner dashboard for content and waitlist management.</p>
    </div>
    <div class="admin-topbar-actions">
      <a class="admin-link" href="/">View Site</a>
      <button id="adminLogout" class="admin-ghost" type="button">Log Out</button>
    </div>
  </header>

  <main class="admin-shell">
    <section id="adminAuth" class="auth-card">
      <p class="admin-label">Owner Login</p>
      <h1>Enter the WOL owner password.</h1>
      <form id="adminLoginForm" class="auth-form" novalidate>
        <label for="adminPassword">Password</label>
        <input id="adminPassword" type="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
        <button class="admin-button" type="submit">Enter Dashboard</button>
        <p id="adminLoginMessage" class="admin-message" aria-live="polite"></p>
      </form>
    </section>

    <section id="adminDashboard" class="dashboard hidden">
      <div class="stats-grid">
        <article class="stat-card">
          <p class="admin-label">Waitlist Count</p>
          <h2 id="waitlistCount">0</h2>
        </article>
        <article class="stat-card">
          <p class="admin-label">Most Recent Signup</p>
          <h2 id="latestSignup">No entries yet</h2>
        </article>
      </div>

      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="admin-label">Content Editor</p>
            <h2>Update live site copy</h2>
          </div>
          <p id="contentMessage" class="admin-message" aria-live="polite"></p>
        </div>

        <form id="contentForm" class="content-form" novalidate>
          <label for="navTaglineInput">Navigation tagline</label>
          <input id="navTaglineInput" name="navTagline" type="text">

          <label for="quoteInput">Brand quote</label>
          <input id="quoteInput" name="quote" type="text">

          <label for="heroTitleInput">Hero title</label>
          <input id="heroTitleInput" name="heroTitle" type="text">

          <label for="heroTextInput">Hero text</label>
          <textarea id="heroTextInput" name="heroText" rows="4"></textarea>

          <label for="manifestoHeadingInput">Manifesto heading</label>
          <input id="manifestoHeadingInput" name="manifestoHeading" type="text">

          <label for="manifestoBodyInput">Manifesto body</label>
          <textarea id="manifestoBodyInput" name="manifestoBody" rows="4"></textarea>

          <label for="productNameInput">Product name</label>
          <input id="productNameInput" name="productName" type="text">

          <label for="productPriceInput">Product price</label>
          <input id="productPriceInput" name="productPrice" type="text">

          <label for="productSizesInput">Product sizes</label>
          <input id="productSizesInput" name="productSizes" type="text">

          <label for="productDescriptionInput">Product description</label>
          <textarea id="productDescriptionInput" name="productDescription" rows="4"></textarea>

          <label for="productStoryInput">Product story</label>
          <textarea id="productStoryInput" name="productStory" rows="5"></textarea>

          <label for="productImageInput">Product image URL</label>
          <input id="productImageInput" name="productImage" type="url">

          <button class="admin-button" type="submit">Save Changes</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="admin-label">Waitlist</p>
            <h2>Launch email signups</h2>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Email</th>
                <th>Joined</th>
              </tr>
            </thead>
            <tbody id="waitlistTable"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script src="/admin.js" defer></script>
</body>
</html>
